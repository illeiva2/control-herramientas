{% extends "base.html" %}
{% block title %}Trabajadores — Pañol{% endblock %}
{% block content %}
<h1>Trabajadores</h1>
<table>
  <thead><tr><th>Nombre</th><th>DNI</th><th class="der">Herramientas pendientes</th></tr></thead>
  <tbody>
  {% for e in rows %}
    <tr>
      <td><a href="{{ url_for('empleado', eid=e.id) }}">{{ e.nombre }}</a></td>
      <td>{{ e.dni or '' }}</td>
      <td class="der {% if e.pendientes > 0 %}naranja{% endif %}">{{ e.pendientes }}</td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
