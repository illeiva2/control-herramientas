<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Control de Herramientas{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
  <div class="brand">🔧 Pañol</div>
  <nav>
    <a href="{{ url_for('index') }}" {% if request.path == '/' %}class="on"{% endif %}>Inicio</a>
    <a href="{{ url_for('registrar') }}" {% if request.path.startswith('/registrar') %}class="on"{% endif %}>Registrar</a>
    <a href="{{ url_for('herramientas') }}" {% if request.path.startswith('/herramientas') %}class="on"{% endif %}>Herramientas</a>
    <a href="{{ url_for('cajas') }}" {% if request.path.startswith('/cajas') %}class="on"{% endif %}>Cajas</a>
    <a href="{{ url_for('empleados') }}" {% if request.path.startswith('/empleados') %}class="on"{% endif %}>Trabajadores</a>
    <a href="{{ url_for('movimientos') }}" {% if request.path.startswith('/movimientos') %}class="on"{% endif %}>Historial</a>
    <a href="{{ url_for('maestros') }}" {% if request.path.startswith('/maestros') %}class="on"{% endif %}>Maestros</a>
  </nav>
  <button id="update-badge" class="update-badge" hidden title="Hay una versión nueva del programa">⬆ Actualización disponible</button>
</header>
<main>
  {% with mensajes = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in mensajes %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<footer class="pie">Control de Herramientas v{{ version_app }}</footer>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
